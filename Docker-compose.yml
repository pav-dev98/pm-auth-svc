services:
  postgres:
    image: postgres:16-alpine
    container_name: pm-auth-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pm_auth
    ports:
      - "5432:5432"
    volumes:
      - pm_auth_data:/var/lib/postgresql/data

volumes:
  pm_auth_data: